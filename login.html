<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — Nova Studio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">
    <div class="brand"><span class="dot"></span> Nova Studio</div>
    <p class="auth-sub">لوحة التحكم — لأصحاب الاستوديو فقط</p>

    <p id="auth-error" class="auth-error">كلمة السر غير صحيحة، حاول مرة أخرى.</p>

    <form id="login-form">
      <div class="field">
        <label for="password">كلمة السر</label>
        <input type="password" id="password" name="password" required placeholder="••••••••••••">
      </div>
      <button type="submit" class="btn btn-primary">دخول</button>
    </form>

    <a href="index.html" class="auth-back">← الرجوع للموقع الرئيسي</a>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
